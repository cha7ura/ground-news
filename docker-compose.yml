services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: ground-news-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-masterKey}
      - MEILI_ENV=development
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ground-news-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  firecrawl-playwright:
    image: mcr.microsoft.com/playwright:v1.49.1-noble
    container_name: ground-news-playwright
    command: npx --yes playwright@1.49.1 run-server --port 3000 --host 0.0.0.0
    ports:
      - "3100:3000"
    restart: unless-stopped

  firecrawl-postgres:
    image: postgres:16-alpine
    container_name: ground-news-firecrawl-postgres
    environment:
      - POSTGRES_USER=firecrawl
      - POSTGRES_PASSWORD=firecrawl
      - POSTGRES_DB=firecrawl
    volumes:
      - firecrawl_postgres_data:/var/lib/postgresql/data
      - ./docker/firecrawl-init.sql:/docker-entrypoint-initdb.d/nuq.sql:ro
    restart: unless-stopped

  firecrawl-rabbitmq:
    image: rabbitmq:3-alpine
    container_name: ground-news-firecrawl-rabbitmq
    restart: unless-stopped

  firecrawl:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: ground-news-firecrawl
    ports:
      - "3002:3002"
    environment:
      - REDIS_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000
      - NUQ_DATABASE_URL=postgresql://firecrawl:firecrawl@firecrawl-postgres:5432/firecrawl
      - NUQ_RABBITMQ_URL=amqp://guest:guest@firecrawl-rabbitmq:5672
      - PORT=3002
      - HOST=0.0.0.0
      - NUM_WORKERS_PER_QUEUE=2
      - USE_DB_AUTHENTICATION=false
    depends_on:
      - redis
      - firecrawl-playwright
      - firecrawl-postgres
      - firecrawl-rabbitmq
    restart: unless-stopped

  # Workflow orchestration (n8n)
  # Scheduled workflows for article ingestion, enrichment, and clustering
  # Admin UI at http://localhost:5678
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ground-news-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Colombo
      - TZ=Asia/Colombo
      # Pass through env vars for n8n workflows
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-masterKey}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-nvidia/nemotron-3-nano-30b-a3b:free}
      - EMBEDDING_API_URL=http://ollama:11434/v1/embeddings
      - EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - FIRECRAWL_API_URL=http://firecrawl:3002
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - redis
      - meilisearch
      - firecrawl
      - ollama
    restart: unless-stopped

  # Embedding model server (Ollama)
  # Serves Qwen3-Embedding via OpenAI-compatible /v1/embeddings endpoint
  # On first start, pulls the model (~400MB for 0.6B Q4). Subsequent starts use cache.
  ollama:
    image: ollama/ollama:latest
    container_name: ground-news-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  meilisearch_data:
  redis_data:
  ollama_data:
  firecrawl_postgres_data:
  n8n_data:
